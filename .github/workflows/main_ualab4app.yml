# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ualab4App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ualab4.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5D6699CB0FC4481880D1FB629BC28ABB }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8936D185EAAD4256AC77B5BE72662573 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ualab4.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5D6699CB0FC4481880D1FB629BC28ABB }}/ualab4.1:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'ualab4App'
          slot-name: 'Production'
          images: 'ualab4.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5D6699CB0FC4481880D1FB629BC28ABB }}/ualab4.1:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8E96C8F9939842FAB74B36C256C6F4FB }}